<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boo - Lạc Vào Thế Giới Phép Thuật</title>
    <style>
        /* ================= CSS GIAO DIỆN ================= */
        body {
            margin: 0; padding: 0;
            font-family: 'Georgia', serif; /* Font có chân phong cách sách cổ */
            background-color: #0a0a0a;
            color: #333;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        /* Container chính của Game */
        .game-container {
            display: flex; width: 90vw; max-width: 1200px; height: 85vh;
            background-color: #2b2219; border: 4px solid #5c4a3d;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* VÙNG BÊN TRÁI: VĂN BẢN (STORY) */
        .main-panel {
            flex: 7; background-color: #f4ecd8; padding: 30px;
            display: flex; flex-direction: column; border-right: 4px solid #5c4a3d;
            transition: background-color 0.2s;
        }

        .story-text {
            flex-grow: 1; overflow-y: auto; font-size: 18px; line-height: 1.6;
            margin-bottom: 12px; padding-right: 15px;
        }
        
        /* Tùy chỉnh thanh cuộn */
        .story-text::-webkit-scrollbar { width: 8px; }
        .story-text::-webkit-scrollbar-thumb { background: #8c7355; border-radius: 4px; }

        .room-title {
            font-size: 26px; font-weight: bold; color: #61130d;
            border-bottom: 2px dashed #8c7355; padding-bottom: 10px; margin-bottom: 20px;
        }

        .puzzle-box {
            background-color: #e6dac3; padding: 15px; border-radius: 5px;
            border-left: 5px solid #8c7355; font-style: italic; margin: 15px 0;
        }

        .choices-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .choice-btn {
            background-color: #5c4a3d; color: #f4ecd8; border: none;
            padding: 10px 12px; font-size: 14px; font-family: inherit;
            cursor: pointer; border-radius: 5px; transition: 0.15s; text-align: left;
        }
        .choice-btn:hover { background-color: #8c7355; }
        .choice-btn.action-btn { background-color: #2b5c2b; }
        .choice-btn.action-btn:hover { background-color: #3d803d; }

        /* VÙNG BÊN PHẢI: BẢNG CHỈ SỐ & HÌNH ẢNH */
        .sidebar {
            flex: 3; background-color: #31271f; color: #e0d5c1;
            display: flex; flex-direction: column; padding: 15px;
        }

        .player-profile {
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
            padding-bottom: 10px; border-bottom: 1px solid #5c4a3d;
        }
        .avatar {
            width: 50px; height: 50px; background-color: #5c4a3d; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; border: 2px solid #8c7355;
        }
        .player-name { font-size: 18px; font-weight: bold; color: #ffcc00; }

        .save-load-btns {
            display: flex; gap: 6px; margin-left: auto;
        }
        .save-load-btns button {
            background-color: #44372c; color: #e0d5c1; border: 1px solid #5c4a3d;
            padding: 4px 10px; font-size: 12px; font-family: inherit;
            cursor: pointer; border-radius: 4px; transition: 0.15s;
        }
        .save-load-btns button:hover { background-color: #5c4a3d; color: #ffcc00; }

        .stats-box { margin-bottom: 10px; font-size: 16px; }
        .inventory-box { margin-bottom: 10px; flex-grow: 0; }
        .inventory-list { list-style: none; padding: 0; margin: 0; }
        .inventory-list li {
            background-color: #44372c; padding: 5px 10px; margin-bottom: 4px;
            border-radius: 4px; font-size: 13px;
        }

        .location-image-box {
            width: 100%; height: 160px; background-color: #1a1510;
            border: 2px solid #5c4a3d; border-radius: 5px;
            display: flex; justify-content: center; align-items: center; margin-top: auto;
            flex-shrink: 0;
        }
        .placeholder-img { font-size: 70px; }

        /* Animation chớp đỏ khi mất máu */
        @keyframes flashRed {
            0% { background-color: #f4ecd8; }
            50% { background-color: #ffcccc; }
            100% { background-color: #f4ecd8; }
        }
        .damage-flash { animation: flashRed 0.5s ease; }

        .mute-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 44px; height: 44px; background-color: #31271f;
            border: 2px solid #5c4a3d; border-radius: 50%;
            font-size: 22px; cursor: pointer; color: #e0d5c1;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: 0.15s; user-select: none;
        }
        .mute-btn:hover { background-color: #5c4a3d; }
        .mute-btn.muted { border-color: #8c3a3a; color: #8c3a3a; }

        .map-btn {
            position: fixed; top: 20px; right: 20px;
            width: 52px; height: 52px; background-color: #31271f;
            border: 2px solid #5c4a3d; border-radius: 10px;
            font-size: 24px; cursor: pointer; color: #e0d5c1;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: 0.15s; user-select: none;
            font-family: 'Georgia', serif;
        }
        .map-btn:hover { background-color: #5c4a3d; border-color: #ffcc00; color: #ffcc00; }

        .map-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.75); z-index: 200;
            justify-content: center; align-items: center;
        }
        .map-overlay.open { display: flex; }

        .map-panel {
            background-color: #2b2219; border: 3px solid #5c4a3d;
            border-radius: 10px; padding: 25px; width: 660px; height: 520px;
            position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
        }
        .map-title {
            font-size: 22px; font-weight: bold; color: #ffcc00;
            text-align: center; margin-bottom: 15px; font-family: 'Georgia', serif;
            flex-shrink: 0;
        }
        .map-close {
            position: absolute; top: 12px; right: 18px; z-index: 20;
            background: none; border: none; color: #e0d5c1;
            font-size: 26px; cursor: pointer; font-family: inherit;
            transition: 0.15s;
        }
        .map-close:hover { color: #ffcc00; }

        .map-area {
            width: 100%; flex: 1; min-height: 0; position: relative;
            background-color: #1a1510; border: 1px solid #44372c;
            border-radius: 5px; overflow: hidden;
        }
        .map-area svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .map-node {
            position: absolute; transform: translate(-50%, -50%);
            width: 28px; height: 28px; background-color: #5c4a3d;
            border: 2px solid #8c7355; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; z-index: 10; cursor: default;
            transition: 0.15s; pointer-events: none;
        }
        .map-node.visited { background-color: #8c7355; border-color: #c9a96e; }
        .map-node.current { background-color: #cc2222; border-color: #ff4444; width: 34px; height: 34px; font-size: 16px; box-shadow: 0 0 12px #ff4444; }

        .map-label {
            position: absolute; transform: translate(-50%, 12px);
            font-size: 9px; color: #c9a96e; text-align: center;
            white-space: nowrap; pointer-events: none;
            font-family: 'Georgia', serif; text-shadow: 0 0 3px #000;
        }
        .map-legend {
            display: flex; gap: 16px; margin-top: 8px; flex-shrink: 0;
            font-size: 12px; color: #c9a96e; font-family: 'Georgia', serif;
        }
        .map-legend-dot {
            display: inline-block; width: 12px; height: 12px;
            border-radius: 50%; margin-right: 4px; vertical-align: middle;
        }
        .map-legend-dot.current { background-color: #cc2222; box-shadow: 0 0 4px #ff4444; }
        .map-legend-dot.visited { background-color: #8c7355; }
        .map-legend-dot.unexplored { background-color: #44372c; border: 1px solid #5c4a3d; }

        /* ================= MOBILE LANDSCAPE ================= */
        @media (max-height: 500px) {
            body { height: auto; min-height: 100vh; }
            .game-container {
                width: 100vw; height: 100vh; max-width: none;
                border-radius: 0; border-width: 2px;
            }
            .main-panel {
                flex: 2.2; padding: 6px 8px; border-right-width: 2px;
            }
            .room-title {
                font-size: 14px; padding-bottom: 3px; margin-bottom: 4px;
            }
            .story-text { font-size: 11px; line-height: 1.3; padding-right: 4px; }
            .puzzle-box { padding: 4px 6px; font-size: 11px; margin: 4px 0; }
            .choices-area { grid-template-columns: 1fr 1fr; gap: 3px; }
            .choice-btn { padding: 4px 6px; font-size: 10px; border-radius: 3px; }
            .sidebar {
                flex: 1; padding: 5px 7px; font-size: 11px;
            }
            .player-profile { gap: 4px; margin-bottom: 4px; padding-bottom: 3px; }
            .avatar { width: 28px; height: 28px; font-size: 14px; }
            .player-name { font-size: 12px; }
            .save-load-btns { gap: 2px; }
            .save-load-btns button { padding: 1px 5px; font-size: 9px; }
            .stats-box { font-size: 12px; margin-bottom: 4px; }
            .inventory-box h3 { font-size: 12px; margin-bottom: 2px; padding-bottom: 2px; }
            .inventory-box { margin-bottom: 4px; flex-grow: 0; }
            .inventory-list li { padding: 2px 5px; margin-bottom: 2px; font-size: 10px; }
            .location-image-box { height: 50px; margin-top: 4px; }
            .placeholder-img { font-size: 28px; }

            .map-btn { top: 6px; right: 6px; width: 30px; height: 30px; font-size: 16px; border-radius: 5px; }
            .mute-btn { bottom: 6px; right: 6px; width: 28px; height: 28px; font-size: 14px; }
            .map-overlay { align-items: stretch; padding: 5px; }
            .map-panel { width: 100%; max-height: 95vh; height: auto; padding: 10px; border-radius: 6px; flex: 0 1 auto; }
            .map-title { font-size: 14px; margin-bottom: 6px; }
            .map-area { flex: 1; height: auto; min-height: 200px; }
            .map-node { width: 20px; height: 20px; font-size: 10px; }
            .map-node.current { width: 24px; height: 24px; font-size: 11px; }
            .map-label { font-size: 7px; }
            .map-legend { font-size: 10px; gap: 6px; margin-top: 4px; }
            .map-close { font-size: 22px; top: 6px; right: 10px; }
        }

        /* ================= MOBILE PORTRAIT ================= */
        @media (max-width: 600px) {
            .game-container {
                flex-direction: column; width: 100vw; height: 100vh;
                max-width: none; border-radius: 0; border-width: 2px;
            }
            .main-panel {
                flex: 1 1 0; padding: 8px 10px; border-right: none;
                border-bottom: 2px solid #5c4a3d; overflow: hidden;
            }
            .room-title { font-size: 15px; padding-bottom: 3px; margin-bottom: 5px; }
            .story-text { font-size: 13px; line-height: 1.35; padding-right: 4px; }
            .puzzle-box { padding: 6px 8px; font-size: 12px; margin: 5px 0; }
            .choices-area { grid-template-columns: 1fr; gap: 3px; }
            .choice-btn { padding: 6px 8px; font-size: 11px; border-radius: 3px; }
            .sidebar {
                flex: 0 0 auto; padding: 5px 10px; flex-direction: row;
                flex-wrap: wrap; gap: 5px; align-items: flex-start;
                min-height: auto; max-height: 100px; overflow: hidden;
            }
            .player-profile { width: 100%; gap: 5px; margin-bottom: 2px; padding-bottom: 2px; }
            .avatar { width: 28px; height: 28px; font-size: 14px; }
            .player-name { font-size: 13px; }
            .save-load-btns { gap: 2px; }
            .save-load-btns button { padding: 2px 6px; font-size: 9px; }
            .stats-box { font-size: 12px; margin-bottom: 0; margin-right: 8px; }
            .inventory-box { margin-bottom: 0; flex-grow: 0; max-height: 60px; overflow-y: auto; }
            .inventory-box h3 { font-size: 11px; margin-bottom: 1px; padding-bottom: 1px; }
            .inventory-list li { padding: 2px 5px; margin-bottom: 1px; font-size: 10px; }
            .location-image-box { display: none; }

            .map-btn { top: 6px; right: 6px; width: 30px; height: 30px; font-size: 16px; border-radius: 5px; }
            .mute-btn { bottom: 6px; right: 6px; width: 28px; height: 28px; font-size: 14px; }
            .map-overlay { align-items: stretch; padding: 5px; }
            .map-panel { width: 100%; max-height: 90vh; height: auto; padding: 10px; border-radius: 6px; flex: 0 1 auto; }
            .map-title { font-size: 14px; margin-bottom: 6px; }
            .map-area { flex: 1; height: auto; min-height: 250px; }
            .map-node { width: 22px; height: 22px; font-size: 11px; }
            .map-node.current { width: 26px; height: 26px; font-size: 12px; }
            .map-label { font-size: 8px; }
            .map-legend { font-size: 10px; gap: 6px; margin-top: 4px; }
            .map-close { font-size: 22px; top: 6px; right: 10px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="main-panel" id="main-panel">
            <div class="room-title" id="ui-room-title">Chờ tải game...</div>
            <div class="story-text" id="ui-story-text">
                <div id="ui-room-desc"></div>
                <div id="ui-log"></div>
            </div>
            <div class="choices-area" id="ui-choices"></div>
        </div>

        <div class="sidebar">
            <div class="player-profile">
                <div class="avatar">🤓</div>
                <div class="player-name">Boo</div>
                <div class="save-load-btns">
                    <button onclick="saveGame()" title="Lưu game vào máy">💾 Lưu</button>
                    <button onclick="loadGame()" title="Tải game đã lưu">📂 Tải</button>
                </div>
            </div>
            <div class="stats-box">
                Máu (HP): <span id="ui-hp">❤️❤️❤️</span><br>
                Chế độ: <span id="ui-mode">🌱 Cơ bản</span>
            </div>
            <div class="inventory-box" style="flex-grow:0;">
                <h3 style="margin-top:0; border-bottom: 1px solid #5c4a3d; padding-bottom:4px; font-size:13px;">🎒 Hành Trang</h3>
                <ul class="inventory-list" id="ui-inventory" style="max-height:50px; overflow-y:auto;"></ul>
            </div>
            <div class="inventory-box" style="flex-grow:0;">
                <h3 style="margin-top:0; margin-bottom:2px; border-bottom: 1px solid #5c4a3d; padding-bottom:3px; font-size:13px;">🔮 Ấn (<span id="ui-frag-count">0</span>/17)</h3>
                <ul class="inventory-list" id="ui-fragments" style="max-height:50px; overflow-y:auto;"></ul>
            </div>
            <div class="location-image-box">
                <div class="placeholder-img" id="ui-room-img">...</div>
            </div>
        </div>
    </div>

    <div class="map-btn" id="map-btn" onclick="openMap()" title="Bản đồ">🗺️</div>
    <div class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Bật/Tắt âm thanh">🔊</div>

    <div class="map-overlay" id="map-overlay" onclick="closeMap(event)">
        <div class="map-panel" onclick="event.stopPropagation()">
            <button class="map-close" onclick="closeMap()">✕</button>
            <div class="map-title">🗺️ Bản Đồ Lâu Đài Phép Thuật</div>
            <div class="map-area" id="map-area">
                <svg id="map-svg"></svg>
            </div>
            <div class="map-legend">
                <span><span class="map-legend-dot current"></span> Vị trí của Boo</span>
                <span><span class="map-legend-dot visited"></span> Đã khám phá</span>
                <span><span class="map-legend-dot unexplored"></span> Chưa khám phá</span>
            </div>
        </div>
    </div>

    <!-- Ngân hàng câu hỏi & generator toán - muốn thêm đề mới chỉ cần sửa questions.js -->
    <script src="questions.js"></script>
    <script>
        /* ================= HỆ THỐNG AUDIO (WEB AUDIO API) ================= */
        const MUSIC_CREEPY  = "creepy";
        const MUSIC_BATTLE  = "battle";
        const MUSIC_SAFE    = "safe";
        const MUSIC_SCHOOL  = "school";
        const MUSIC_DUNGEON = "dungeon";
        const MUSIC_KITCHEN = "kitchen";
        const MUSIC_TOWER   = "tower";
        const MUSIC_LIBRARY = "library";
        const MUSIC_GARDEN  = "garden";

        let audioCtx = null;
        let masterGain = null;
        let droneNodes = [];
        let melodyTimer = null;
        let melodyGain = null;
        let melodyOscNodes = [];
        let currentBgm = "";

        function initAudioCtx() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.30;
            masterGain.connect(audioCtx.destination);
            melodyGain = audioCtx.createGain();
            melodyGain.gain.value = 0.25;
            melodyGain.connect(masterGain);
        }

        function stopAll() {
            droneNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            droneNodes = [];
            melodyOscNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            melodyOscNodes = [];
            if (melodyTimer) { clearInterval(melodyTimer); melodyTimer = null; }
        }

        function playNote(freq, startTime, dur, vol, type) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            osc.type = type || "square";
            osc.frequency.value = freq;
            let env = audioCtx.createGain();
            env.gain.setValueAtTime(0, startTime);
            env.gain.linearRampToValueAtTime(vol, startTime + 0.015);
            env.gain.setValueAtTime(vol, startTime + dur * 0.6);
            env.gain.linearRampToValueAtTime(0, startTime + dur);
            osc.connect(env);
            env.connect(melodyGain);
            osc.start(startTime);
            osc.stop(startTime + dur + 0.01);
            melodyOscNodes.push(osc);
        }

        function startMelody(notes, bpm, waveType) {
            stopAllMelody();
            let beatMs = 60000 / bpm;
            let idx = 0;

            function scheduleLoop() {
                let now = audioCtx.currentTime;
                let barCount = 8;
                for (let i = 0; i < barCount; i++) {
                    let t = now + i * (beatMs / 1000);
                    let n = notes[idx % notes.length];
                    if (n > 0) {
                        playNote(n, t, beatMs / 1000 * 0.85, 0.14, waveType);
                    }
                    idx++;
                }
            }

            scheduleLoop();
            melodyTimer = setInterval(scheduleLoop, (beatMs * 8) * 0.95);
        }

        function stopAllMelody() {
            melodyOscNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            melodyOscNodes = [];
            if (melodyTimer) { clearInterval(melodyTimer); melodyTimer = null; }
        }

        function startDrone(notes, waveType, vol) {
            droneNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            droneNodes = [];
            notes.forEach(n => {
                let osc = audioCtx.createOscillator();
                osc.type = waveType || "triangle";
                osc.frequency.value = n;
                let g = audioCtx.createGain();
                g.gain.value = vol;
                osc.connect(g);
                g.connect(masterGain);
                osc.start();
                droneNodes.push(osc);
            });
        }

        function playClick() {
            if (!audioCtx || masterGain.gain.value < 0.005) return;
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            osc.type = "sine";
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.linearRampToValueAtTime(400, now + 0.04);
            let env = audioCtx.createGain();
            env.gain.setValueAtTime(0.09, now);
            env.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.connect(env);
            env.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.06);
        }

        function playCreepy() {
            initAudioCtx(); stopAll();
            startDrone([262, 330, 392], "sine", 0.012);
            startMelody([294, 330, 349, 440, 349, 330, 294, 262, 330, 349, 392, 349, 330, 294, 262, 294], 102, "triangle");
        }

        function playBattle() {
            initAudioCtx(); stopAll();
            startDrone([262, 330, 392], "triangle", 0.012);
            startMelody([392, 440, 523, 440, 392, 523, 440, 392, 330, 392, 440, 523, 440, 392, 330, 262], 112, "square");
        }

        function playSafe() {
            initAudioCtx(); stopAll();
            startDrone([262, 330, 392], "sine", 0.012);
            startMelody([262, 330, 392, 523, 440, 392, 330, 262, 294, 330, 392, 440, 523, 440, 392, 330], 108, "triangle");
        }

        function playSchool() {
            initAudioCtx(); stopAll();
            startDrone([262, 330, 392], "sine", 0.012);
            startMelody([262, 330, 392, 523, 440, 392, 330, 262, 294, 262, 330, 349, 392, 440, 349, 330], 90, "triangle");
        }

        function playDungeon() {
            initAudioCtx(); stopAll();
            startDrone([262, 311, 392], "sine", 0.012);
            startMelody([294, 330, 349, 440, 349, 330, 294, 262, 330, 349, 392, 349, 330, 294, 262, 294], 100, "triangle");
        }

        function playKitchen() {
            initAudioCtx(); stopAll();
            startDrone([196, 294, 392], "triangle", 0.012);
            startMelody([294, 392, 440, 392, 294, 330, 392, 294, 440, 392, 330, 294, 392, 294, 330, 294], 118, "square");
        }

        function playTower() {
            initAudioCtx(); stopAll();
            startDrone([330, 440], "sine", 0.012);
            startMelody([262, 294, 330, 349, 392, 440, 523, 440, 392, 349, 330, 294, 262, 330, 392, 523], 100, "triangle");
        }

        function playLibrary() {
            initAudioCtx(); stopAll();
            startDrone([349, 440, 523], "sine", 0.010);
            startMelody([349, 392, 440, 349, 440, 523, 440, 392, 349, 330, 349, 392, 440, 349, 392, 349], 88, "triangle");
        }

        function playGarden() {
            initAudioCtx(); stopAll();
            startDrone([440, 554, 659], "sine", 0.010);
            startMelody([440, 554, 659, 554, 440, 554, 494, 440, 494, 554, 440, 659, 554, 494, 440, 494], 95, "triangle");
        }

        function playMusic(type) {
            if (!type || currentBgm === type) return;
            currentBgm = type;

        /* ================= CÁC HÀM XỬ LÝ LOGIC ================= */

        function enterRoom(roomId) {
            state.currentRoom = roomId;
            if (!state.visitedRooms.includes(roomId)) state.visitedRooms.push(roomId);
            if (ROOM_PUZZLES[roomId]) state.q[roomId] = getPuzzle(ROOM_PUZZLES[roomId], state.difficulty);
            playMusic(rooms[roomId].music);
            document.getElementById("ui-log").innerHTML = "";
            updateUI(roomId);
        }

        function updateUI(roomId) {
            const room = rooms[roomId];
            
            document.getElementById("ui-room-title").innerText = room.title;
            document.getElementById("ui-room-desc").innerHTML = room.renderText();
            
            const choicesDiv = document.getElementById("ui-choices");
            choicesDiv.innerHTML = "";
            room.renderChoices().forEach(choice => {
                let btn = document.createElement("button");
                btn.className = "choice-btn " + (choice.type === "action" ? "action-btn" : "");
                btn.innerText = choice.text;
                btn.onclick = () => { playClick(); choice.action(); };
                choicesDiv.appendChild(btn);
            });

            const storyDiv = document.getElementById("ui-story-text");
            storyDiv.scrollTop = storyDiv.scrollHeight;

            document.getElementById("ui-room-img").innerText = room.emoji;
            document.getElementById("ui-hp").innerText = "❤️".repeat(state.hp) + "🖤".repeat(state.maxHp - state.hp);
            document.getElementById("ui-mode").innerText = state.difficulty === 2 ? "🔥 Thử thách" : "🌱 Cơ bản";
            
            const invList = document.getElementById("ui-inventory");
            if (state.inventoryNames.length === 0) {
                invList.innerHTML = `<li style="color: #888; font-style: italic;">Trống không...</li>`;
            } else {
                invList.innerHTML = state.inventoryNames.map(item => `<li>${item}</li>`).join("");
            }

            document.getElementById("ui-frag-count").innerText = state.fragments.length;
            const fragList = document.getElementById("ui-fragments");
            if (state.fragmentNames.length === 0) {
                fragList.innerHTML = "";
            } else {
                fragList.innerHTML = state.fragmentNames.map(f => `<li style="font-size:12px;">${f}</li>`).join("");
            }
        }

        function wrongAnswer(msg, fallBackRoomId = null) {
            // Sai lần đầu ở mỗi câu đố: chỉ nhận gợi ý, chưa trừ máu
            const q = state.q[state.currentRoom];
            if (q && !q.hintGiven) {
                q.hintGiven = true;
                logMessage(`💡 Chưa đúng! ${msg} Bình tĩnh thử lại nhé - sai lần nữa mới bị trừ máu.`, "#b8860b");
                updateUI(state.currentRoom);
                return;
            }

            let autoHealed = false;
            if (state.inventory.includes("RuouHoiPhuc")) {
                removeItem("RuouHoiPhuc");
                healToMax();
                logMessage(`🍷 Rượu Hồi Phục tự động hồi đầy máu, hóa giải sát thương!`, "green");
                autoHealed = true;
            } else if (state.inventory.includes("ThuocMau")) {
                removeItem("ThuocMau");
                healHP(1);
                logMessage(`🧪 Thuốc Hồi Máu tự động hồi 1 máu, hóa giải sát thương!`, "green");
                autoHealed = true;
            }

            if (autoHealed) {
                updateUI(state.currentRoom);
                return;
            }

            state.hp -= 1;
            
            const panel = document.getElementById("main-panel");
            panel.classList.add("damage-flash");
            setTimeout(() => panel.classList.remove("damage-flash"), 500);

            document.getElementById("ui-hp").innerText = "❤️".repeat(state.hp) + "🖤".repeat(state.maxHp - state.hp);

            if (state.hp <= 0) {
                logMessage(`❌ SAI RỒI! ${msg}`, "red");
                const choicesDiv = document.getElementById("ui-choices");
                choicesDiv.innerHTML = `<button class="choice-btn action-btn" onclick="resetGame()">Boo kiệt sức, trở về điểm bắt đầu... ➔</button>`;
            } else {
                logMessage(`❌ SAI RỒI! ${msg} (-1 HP)`, "red");
                
                if (fallBackRoomId) {
                    const choicesDiv = document.getElementById("ui-choices");
                    choicesDiv.innerHTML = `<button class="choice-btn action-btn" onclick="enterRoom(${fallBackRoomId})">Bị hất văng về màn trước ➔</button>`;
                } else {
                    updateUI(state.currentRoom);
                }
            }
            
            const storyDiv = document.getElementById("ui-story-text");
            storyDiv.scrollTop = storyDiv.scrollHeight;
        }

            document.getElementById("ui-log").innerHTML += `<p style="color:${color}; font-weight:bold;">${msg}</p>`;

        /* ================= BẢN ĐỒ ================= */

        function openMap() {
            const overlay = document.getElementById("map-overlay");
            overlay.classList.add("open");
            renderMap();
        }

        function closeMap(e) {
            if (e && e.target !== document.getElementById("map-overlay")) return;
            document.getElementById("map-overlay").classList.remove("open");
        }

        function renderMap() {
            const area = document.getElementById("map-area");
            const svg = document.getElementById("map-svg");
            const w = area.clientWidth, h = area.clientHeight;

            svg.innerHTML = "";
            svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

            const visited = state.visitedRooms;
            const current = state.currentRoom;

            mapData.connections.forEach(([a, b]) => {
                if (visited.includes(a) || visited.includes(b)) {
                    const pA = mapData.positions[a], pB = mapData.positions[b];
                    const dash = (!visited.includes(a) || !visited.includes(b)) ? "stroke-dasharray=\"4 3\"" : "";
                    svg.innerHTML += `<line x1="${pA[0]}%" y1="${pA[1]}%"
                        x2="${pB[0]}%" y2="${pB[1]}%"
                        stroke="#8c7355" stroke-width="2" opacity="0.7" ${dash}/>`;
                }
            });

            area.querySelectorAll(".map-node").forEach(el => el.remove());
            area.querySelectorAll(".map-label").forEach(el => el.remove());

            for (let id in mapData.positions) {
                const numId = parseInt(id);
                const pos = mapData.positions[id];
                let cls = "map-node";
                if (current === numId) cls += " current";
                else if (visited.includes(numId)) cls += " visited";

                const node = document.createElement("div");
                node.className = cls;
                node.style.left = pos[0] + "%";
                node.style.top = pos[1] + "%";
                node.textContent = visited.includes(numId) ? rooms[numId].emoji : "❓";
                area.appendChild(node);

                if (visited.includes(numId)) {
                    const label = document.createElement("div");
                    label.className = "map-label";
                    label.style.left = pos[0] + "%";
                    label.style.top = pos[1] + "%";
                    label.textContent = mapData.labels[id];
                    area.appendChild(label);
                }
            }
        }

        function healHP(amount) {
            state.hp += amount;
            if (state.hp > state.maxHp) state.hp = state.maxHp;
        }

        function healToMax() {
            state.hp = state.maxHp;
        }

        function toggleMute() {
            const btn = document.getElementById("mute-btn");
            if (!masterGain) { initAudioCtx(); }
            if (masterGain.gain.value > 0.01) {
                masterGain.gain.value = 0;
                btn.innerText = "🔇";
                btn.classList.add("muted");
            } else {
                masterGain.gain.value = 0.30;
                btn.innerText = "🔊";
                btn.classList.remove("muted");
            }
        }

        function saveGame() {
            const saveData = {
                hp: state.hp,
                maxHp: state.maxHp,
                difficulty: state.difficulty,
                inventory: state.inventory,
                inventoryNames: state.inventoryNames,
                fragments: state.fragments,
                fragmentNames: state.fragmentNames,
                bossPhase: state.bossPhase,
                currentRoom: state.currentRoom,
                visitedRooms: state.visitedRooms,
                flags: state.flags
            };
            localStorage.setItem("boo_adventure_save", JSON.stringify(saveData));
            logMessage("💾 Game đã được lưu!", "green");
        }

        function loadGame() {
            const raw = localStorage.getItem("boo_adventure_save");
            if (!raw) {
                logMessage("📂 Không tìm thấy bản lưu nào!", "red");
                return;
            }
            try {
                const saveData = JSON.parse(raw);
                state.hp = saveData.hp;
                state.maxHp = saveData.maxHp;
                state.difficulty = saveData.difficulty || 1;
                state.inventory = saveData.inventory;
                state.inventoryNames = saveData.inventoryNames;
                state.fragments = saveData.fragments || [];
                state.fragmentNames = saveData.fragmentNames || [];
                state.bossPhase = saveData.bossPhase || 0;
                state.currentRoom = saveData.currentRoom;
                state.visitedRooms = saveData.visitedRooms || [];
                state.flags = saveData.flags;
                state.q = {};
                document.getElementById("ui-log").innerHTML = "";
                document.getElementById("ui-choices").innerHTML = "";
                enterRoom(state.currentRoom);
                logMessage("📂 Game đã được tải!", "green");
            } catch (e) {
                logMessage("📂 Lỗi khi tải bản lưu!", "red");
            }
        }

        // Bắt đầu game
        enterRoom(0);
